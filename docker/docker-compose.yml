## Local dev stack for zernflow-fork
## 路徑相對於這個 compose.yml,所有 `..` 都指向 repo root
##
## 用法:
##   cd docker && docker compose up -d --build
## 或從 repo root:
##   docker compose -f docker/docker-compose.yml up -d --build

# 鎖死 project name,避免不同 cwd 導致 volume / network 換名稱
name: zernflow-fork

services:
  app:
    build:
      context: ..                       # build context = repo root
      dockerfile: docker/Dockerfile.dev
    container_name: zernflow-fork-app
    ports:
      - "3000:3000"
    volumes:
      # 把 repo root 掛進去,改檔案 Next.js Turbopack 會 hot reload
      - ..:/app
      # 用 named volume 蓋過 node_modules,避免 Windows 的 binary 汙染 Linux container
      - zernflow_node_modules:/app/node_modules
      - zernflow_next_cache:/app/.next
    env_file:
      - ../.env.local
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      # Windows bind mount 的 file watcher 不靠譜,強制 polling
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: zernflow-fork-ngrok
    command:
      - "http"
      - "--url=bridged-epiphany-tinfoil.ngrok-free.dev"
      - "app:3000"
      - "--log=stdout"
    env_file:
      # NGROK_AUTHTOKEN 在 .env.local(gitignored)
      - ../.env.local
    ports:
      # ngrok 本機 web UI(http://localhost:4040 看流量)
      - "4040:4040"
    depends_on:
      - app
    restart: unless-stopped

  # Comment-polling sidecar.
  # Zernio currently doesn't push IG/FB comments via webhook (only via API),
  # so we poll `/api/cron/comments` every 15s. Interval can be tuned via
  # the COMMENT_POLL_INTERVAL env var in .env.local.
  comment-poller:
    image: curlimages/curl:latest
    container_name: zernflow-fork-comment-poller
    env_file:
      - ../.env.local
    environment:
      # Default 5s for near-realtime feel; override in .env.local with
      # COMMENT_POLL_INTERVAL=15 if you hit Zernio rate limits.
      - COMMENT_POLL_INTERVAL=${COMMENT_POLL_INTERVAL:-5}
    entrypoint:
      - sh
      - -c
      - |
        sleep 10  # wait for app to be ready on cold start
        while true; do
          curl -s -X POST \
            -H "Authorization: Bearer $$CRON_SECRET" \
            http://app:3000/api/cron/comments \
            -o /dev/null -w "[%{time_total}s] cron POST -> %{http_code}\n" \
            || echo "[poll] curl failed"
          sleep $$COMMENT_POLL_INTERVAL
        done
    depends_on:
      - app
    restart: unless-stopped

volumes:
  zernflow_node_modules:
  zernflow_next_cache:
